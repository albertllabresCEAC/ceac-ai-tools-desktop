services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: ceac-ia-tools-keycloak
    command: start-dev --import-realm --proxy-headers xforwarded
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8081}
    volumes:
      - ./realm-ceac-ia-tools.json:/opt/keycloak/data/import/realm-ceac-ia-tools.json:ro
