server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: ceac-ai-tools-desktop
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: ceac-outlook-mcp
        version: 1.0.0
        instructions: |
          Runtime MCP de CEAC IA Tools para Outlook Desktop en Windows mediante COM.
          Permite listar correos, leer detalles, crear borradores, adjuntar archivos, guardar adjuntos y enviar mensajes.
        streamable-http:
          mcp-endpoint: ${mcp.remote.mcp-endpoint}

mcp:
  remote:
    public-base-url: ${MCP_PUBLIC_BASE_URL:http://localhost:${server.port}}
    mcp-endpoint: /mcp
    allowed-origin-patterns:
      - ${MCP_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*}
    auth:
      enabled: ${MCP_AUTH_ENABLED:false}
      issuer-uri: ${MCP_OAUTH_ISSUER_URI:}
      jwk-set-uri: ${MCP_OAUTH_JWK_SET_URI:}
      required-audience: ${MCP_OAUTH_REQUIRED_AUDIENCE:}
      required-scope: ${MCP_OAUTH_REQUIRED_SCOPE:outlook:tools}
      resource-name: ${MCP_RESOURCE_NAME:Outlook MCP}
      scopes-supported:
        - ${MCP_OAUTH_REQUIRED_SCOPE:outlook:tools}

outlook:
  temp-dir: ${java.io.tmpdir}/ceac-ia-tools-outlook-mcp
  default-page-size: 25

jacob:
  dll-path: ${jacob.dll.path:}
  search-paths:
    - lib
    - .
    - target
